services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bellatrix
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/bellatrix
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: bellatrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bellatrix
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d bellatrix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-prod-data:
