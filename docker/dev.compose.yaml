services:
  postgres:
    image: postgres:17-alpine
    container_name: bellatrix-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: bellatrix
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d bellatrix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-dev-data:
